services:
  mysql:
    image: mysql:8.0
    container_name: rifa_mysql
    restart: always
    environment:
      MYSQL_DATABASE: rifa_db
      MYSQL_USER: rifa_user
      MYSQL_PASSWORD: rifa_pass
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql

  server:
    build: ./server
    container_name: rifa_server
    env_file:
      - .env.docker
    environment:
      DB_HOST: mysql
    depends_on:
      - mysql
    ports:
      - "4000:4000"

  client:
    build: ./client
    container_name: rifa_client
    env_file:
      - .env.docker
    depends_on:
      - server
    ports:
      - "3000:3000"

volumes:
  mysql_data:
